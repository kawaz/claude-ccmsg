name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: extractions/setup-just@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # justfile の `lint` recipe (just --fmt --check --unstable)
      - name: Lint
        run: just lint

      # justfile の `typecheck` recipe (bun x tsc --noEmit)
      - name: Typecheck
        run: just typecheck

      # justfile の `test` recipe (bun test)。packages/daemon/test/integration.test.ts の
      # 二重起動防止テストが packages/daemon/src/flock.ts の flock(2) を実際に exercise する。
      # ubuntu-latest で通ることで libc.so.6 経路 (docs/issue/2026-07-03-mvp-followups.md
      # 受け入れ条件 1) が CI 上で継続検証される。
      - name: Test
        run: just test

      # validate (claude plugin validate .) は claude CLI が runner に無いため CI では実行しない。
