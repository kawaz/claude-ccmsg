<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ccmsg</title>
<link rel="stylesheet" href="/app.css" />
</head>
<body>
<div id="app">
  <header id="topbar">
    <button id="menu-toggle" type="button" aria-label="menu">&#9776;</button>
    <h1>ccmsg</h1>
    <span id="conn-status" class="status status-connecting">connecting&hellip;</span>
  </header>
  <div id="layout">
    <nav id="sidebar">
      <section id="rooms-panel">
        <h2>Rooms</h2>
        <ul id="room-list"></ul>
      </section>
      <section id="peers-panel">
        <h2>Peers <button id="peers-refresh" type="button" title="refresh">&#8635;</button></h2>
        <ul id="peer-list"></ul>
      </section>
    </nav>
    <div id="sidebar-backdrop"></div>
    <main id="room-view">
      <p id="empty-state">room を選んでください</p>
    </main>
  </div>
</div>
<script type="module" src="/app.js"></script>
</body>
</html>
